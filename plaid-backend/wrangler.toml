name = "budgettheworld-plaid"
main = "worker.js"
compatibility_date = "2024-11-01"

# Bind the KV namespace that stores the access_token + sync cursor.
# Create it with:  npx wrangler kv namespace create BTW_KV
# then paste the returned id below.
kv_namespaces = [
  { binding = "BTW_KV", id = "REPLACE_WITH_KV_ID" }
]

[vars]
PLAID_ENV = "sandbox"   # switch to "production" for your real Bank of America account (Stage 2)

# PLAID_CLIENT_ID, PLAID_SECRET, and APP_SECRET are NOT stored here — set them as secrets:
#   npx wrangler secret put PLAID_CLIENT_ID
#   npx wrangler secret put PLAID_SECRET
#   npx wrangler secret put APP_SECRET      (any long random string you invent; also paste it into the app)
